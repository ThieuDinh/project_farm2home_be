name: Deploy Backend to SmarterASP

on:
  push:
    branches:
      - main # Hoặc đổi thành 'master' nếu nhánh chính của bạn tên là master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Tải code từ GitHub về máy chủ ảo
      uses: actions/checkout@v3

    - name: 2. Cài đặt môi trường .NET 8.0
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x' # Đổi thành 6.0.x hoặc 7.0.x nếu bạn dùng bản cũ hơn

    - name: 3. Đóng gói dự án (Publish)
      run: dotnet publish -c Release -o ./publish_output

    - name: 4. Đẩy file lên SmarterASP qua FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./publish_output/
        server-dir: /site1/ # Thư mục gốc trên host của bạn
        danger-action: true # Cho phép ghi đè/xóa file cũ